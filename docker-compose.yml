version: '3.8'

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: betting_user
      POSTGRES_PASSWORD: betting_password
      POSTGRES_DB: betting_engine_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting_user -d betting_engine_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  hazelcast:
    image: hazelcast/hazelcast:5.3
    ports:
      - "5701:5701"

  core-service:
    build: ./core
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/betting_engine_db
      - SPRING_DATASOURCE_USERNAME=betting_user
      - SPRING_DATASOURCE_PASSWORD=betting_password
      - HAZELCAST_NETWORK_CLUSTER_MEMBERS=hazelcast:5701
    depends_on:
      postgres:
        condition: service_healthy
      hazelcast:
        condition: service_started

  odds-ingestion:
    build: ./odds-ingestion
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HAZELCAST_NETWORK_CLUSTER_MEMBERS=hazelcast:5701
    depends_on:
      kafka:
        condition: service_healthy
      hazelcast:
        condition: service_started

  settlement-service:
    build: ./settlement
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/betting_engine_db
      - SPRING_DATASOURCE_USERNAME=betting_user
      - SPRING_DATASOURCE_PASSWORD=betting_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
